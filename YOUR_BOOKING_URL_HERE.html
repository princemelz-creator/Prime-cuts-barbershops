<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOKING PAGE</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 CLASS="text-3xl font-bold px-130 text-blue-600">BOOK APPOINTMENT BELOW . THANKS!</h1>
    <form action="https://formsubmit.co/your@email.com" method="POST">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required placeholder="Your Name">

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required placeholder="Email Address">

    <label for="date">Book Appointment.</label>
    <textarea id="date" name="date" required placeholder="DD/MM/YY"></textarea>

    <button type="submit">Book Appointment</button>
    </form>
    <footer>
        <p class="px-120">@all rights reserved by Prime Cuts Barbershop</p>
    </footer> 
</body>
</html>
